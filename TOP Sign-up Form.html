<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>The Odin Project: Sign-Up Form</title>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <meta name="description" content=""/>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
 
  <main>
  <div class="background">
    <h1>THE ODIN PROJECT</h1>
  </div>

  <div class="signup">
  <p class="p1">This is not a real online service! This is just a simple Sign-Up page mock up design. 
    Feel free to mess around with the inputs and buttons.</p>
  <p class="p2">You Know you want to.</p>

  <hr>

  <form>
    <legend>Let's do this!</legend>
    <div class="form">
    <div class="form-input">
              <label for="first-name">FIRST NAME</label>
              <input type="text" id="first-name" name="first-name">
            </div>

            <div class="form-input">
              <label for="last-name">LAST NAME</label>
              <input type="text" id="last-name" name="last-name">
            </div>

            <div class="form-input">
              <label for="email">EMAIL</label>
              <input type="email" id="email" name="email">
            </div>

            <div class="form-input">
              <label for="phone">PHONE NUMBER</label>
              <input type="tel" id="phone" name="phone">
            </div>

            <div class="form-input">
              <label for="password">PASSWORD</label>
              <input type="password" id="password" name="password" required>
            </div>

            <div class="form-input">
              <label for="confirm-password">CONFIRM PASSWORD</label>
              <input type="password" id="confirm-password" name="confirm-password" required>
            </div>
    </div>
    <button type="submit" name="createaccount" class="createaccount">Create Account</button>
    <p class="login">Already have an account? <a href="google.com">Log In.</a></p>
  </form>

  </div>

  <hr>

</main>

</body>

</html>
