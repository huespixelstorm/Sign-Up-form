<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>The Odin Project: Sign-Up Form</title>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <meta name="description" content=""/>

  <style>
    
    main {
      display: flex;
      height: 100vh;
    }
    .background {
      flex: 1;
    background: url("https://plus.unsplash.com/premium_photo-1722584996622-46f592165128?q=80&w=687&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D") no-repeat center/cover;
    color: white;

    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 40px;
    }
    h1 {
      font-size: 100px;
      font-weight: bold;
      padding-top: auto;
    }
    .p1 {
      text-align: justify;
      margin: 50px auto 20px auto;
      padding: 50px 50px 5px 50px;
      font-size: 24px;
      font-family: Arial, Helvetica, sans-serif;
      color: #536b78;
    }
    .p2 {
      text-align: justify;
      margin: 50px auto 20px auto;
      padding: 1px 50px 5px 50px;
      font-size: 24px;
      font-family: Arial, Helvetica, sans-serif;
      color: #536b78;
    }
    .signup {
    flex: 2;
    background-color: #F8F9FA;
    text-align: center;
    font-size: large;
    font-weight: bold;
    align-items: center;
    }
    form {
      text-align: justifys;
    background: white;
    padding: 40px;
    border-radius: 10px;
    color: #637081;
    }
    legend {
      text-align: justify;
      font-size: 24px;
    }
    .form {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
    }
    .form-input {
      display: flex;
      flex-direction: column;
      text-align: justify;
      font-size: 16px;
      transform: translateX(-25%);
      color: #637081;
    }
    label {
      margin: 30px auto 0 auto;
    }
    input {
      margin: 0 auto;
      width: 250px;
      height: 20px;
    }
    button {
      background-color: #014f86;
      color: whitesmoke;
      font-weight: bold;
      border-radius: 5px;
      border: #014f86;
      margin: auto;
      padding: 15px 30px;
      transform: translate(-60%, 30px);
    }
    .login {
      transform: translate(-10%, 30px);
    }

  </style>

</head>

<body>
 
  <main>
  <div class="background">
    <h1>THE ODIN PROJECT</h1>
  </div>

  <div class="signup">
  <p class="p1">This is not a real online service! This is just a simple Sign-Up page mock up design. 
    Feel free to mess around with the inputs and buttons.</p>
  <p class="p2">You Know you want to.</p>

  <hr>

  <form>
    <legend>Let's do this!</legend>
    <div class="form">
    <div class="form-input">
              <label for="first-name">FIRST NAME</label>
              <input type="text" id="first-name" name="first-name">
            </div>

            <div class="form-input">
              <label for="last-name">LAST NAME</label>
              <input type="text" id="last-name" name="last-name">
            </div>

            <div class="form-input">
              <label for="email">EMAIL</label>
              <input type="email" id="email" name="email">
            </div>

            <div class="form-input">
              <label for="phone">PHONE NUMBER</label>
              <input type="tel" id="phone" name="phone">
            </div>

            <div class="form-input">
              <label for="password">PASSWORD</label>
              <input type="password" id="password" name="password" required>
            </div>

            <div class="form-input">
              <label for="confirm-password">CONFIRM PASSWORD</label>
              <input type="password" id="confirm-password" name="confirm-password" required>
            </div>
    </div>
    <button type="submit" name="createaccount" class="createaccount">Create Account</button>
    <p class="login">Already have an account? <a href="google.com">Log In.</a></p>
  </form>

  </div>

  <hr>

</main>

</body>

</html>
